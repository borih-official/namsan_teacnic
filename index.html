<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BORIH · Mindful Walking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage: #8A9E8A;
      --sage-light: #B8C9B2;
      --sage-mist: #E8EEE6;
      --cream: #F5F0E8;
      --teal: #4A7A78;
      --teal-deep: #2E5C5A;
      --stone: #8C8378;
      --stone-light: #C4BDB5;
      --ink: #2C2A27;
      --off-white: #FAF8F4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: 'Poppins', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    /* ── Background layers ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 20% 80%, rgba(138,158,138,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 15%, rgba(74,122,120,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 90% 90% at 50% 50%, var(--cream) 0%, #EDE8DE 100%);
    }

    /* Subtle noise texture */
    .bg-noise {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* Corner botanical marks */
    .corner-mark {
      position: fixed;
      z-index: 1;
      opacity: 0.13;
    }
    .corner-mark.tl { top: 28px; left: 28px; }
    .corner-mark.br { bottom: 28px; right: 28px; transform: rotate(180deg); }

    /* ── Main layout ── */
    .stage {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Brand header ── */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeUp 1.1s ease 0.2s forwards;
    }

    .brand-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: clamp(11px, 2vw, 13px);
      letter-spacing: 0.45em;
      color: var(--teal);
      text-transform: uppercase;
    }

    .brand-divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--sage), transparent);
      margin: 4px auto;
    }

    .brand-sub {
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      font-size: clamp(10px, 1.6vw, 11px);
      letter-spacing: 0.25em;
      color: var(--stone);
    }

    /* ── Center card ── */
    .card {
      margin: 32px 0;
      width: min(480px, 100%);
      background: rgba(250, 248, 244, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(184,201,178,0.38);
      border-radius: 24px;
      padding: 44px 40px 40px;
      box-shadow:
        0 2px 4px rgba(44,42,39,0.04),
        0 12px 40px rgba(74,122,120,0.07),
        inset 0 1px 0 rgba(255,255,255,0.65);
      opacity: 0;
      animation: fadeUp 1.1s ease 0.5s forwards;
    }

    /* Walking scene illustration */
    .scene {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .scene svg {
      opacity: 0.82;
    }

    /* Title block */
    .title-block {
      text-align: center;
      margin-bottom: 32px;
    }

    .walk-label {
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 10px;
      font-weight: 400;
    }

    .walk-title {
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      font-size: clamp(18px, 4vw, 22px);
      color: var(--teal-deep);
      letter-spacing: 0.04em;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .walk-desc {
      font-size: 11px;
      color: var(--stone);
      letter-spacing: 0.12em;
      line-height: 1.8;
      font-weight: 300;
    }

    /* ── Audio zone ── */
    .audio-zone {
      background: rgba(232,238,230,0.45);
      border: 1px solid rgba(138,158,138,0.25);
      border-radius: 16px;
      padding: 28px 24px 24px;
    }

    .audio-drop-label {
      text-align: center;
      margin-bottom: 20px;
    }

    .drop-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(74,122,120,0.1);
      margin-bottom: 12px;
      border: 1px solid rgba(74,122,120,0.2);
    }

    .drop-text {
      font-size: 11px;
      color: var(--stone);
      letter-spacing: 0.1em;
      line-height: 1.8;
    }

    .drop-text strong {
      display: block;
      font-size: 12px;
      color: var(--teal);
      font-weight: 500;
      letter-spacing: 0.18em;
      margin-bottom: 4px;
    }

    /* File input */
    .file-input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .file-input {
      display: none;
    }

    .file-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1.5px dashed rgba(138,158,138,0.5);
      background: rgba(250,248,244,0.5);
      color: var(--teal);
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .file-btn:hover {
      border-color: var(--teal);
      background: rgba(74,122,120,0.06);
    }

    .file-name {
      font-size: 10.5px;
      color: var(--sage);
      text-align: center;
      letter-spacing: 0.1em;
      min-height: 16px;
      margin-top: 8px;
    }

    /* Custom player */
    .player {
      display: none;
    }

    .player.active {
      display: block;
    }

    .player-track {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .time-label {
      font-size: 10px;
      color: var(--stone);
      letter-spacing: 0.08em;
      min-width: 36px;
      text-align: center;
    }

    .progress-wrap {
      flex: 1;
      position: relative;
      height: 3px;
      background: rgba(138,158,138,0.25);
      border-radius: 99px;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--sage), var(--teal));
      border-radius: 99px;
      width: 0%;
      transition: width 0.1s linear;
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--teal);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .progress-wrap:hover .progress-bar::after {
      opacity: 1;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--stone);
      padding: 6px;
      border-radius: 50%;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover {
      color: var(--teal);
      background: rgba(74,122,120,0.08);
    }

    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage) 0%, var(--teal) 100%);
      border: none;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(74,122,120,0.28);
      transition: all 0.25s ease;
    }

    .play-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 22px rgba(74,122,120,0.38);
    }

    .play-btn:active {
      transform: scale(0.97);
    }

    audio { display: none; }

    /* ── Footer caption ── */
    .footer-caption {
      text-align: center;
      opacity: 0;
      animation: fadeUp 1.1s ease 0.8s forwards;
    }

    .footer-caption p {
      font-family: 'Noto Serif KR', serif;
      font-size: 10.5px;
      color: var(--stone-light);
      letter-spacing: 0.2em;
      font-weight: 300;
      line-height: 2;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Breathing dot */
    .breath-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--sage);
      vertical-align: middle;
      margin: 0 6px;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; border-radius: 20px; }
      .stage { padding: 28px 16px; }
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="bg-noise"></div>
</div>

<!-- Corner marks -->
<svg class="corner-mark tl" width="54" height="54" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 52 C2 28 10 10 52 2" stroke="#4A7A78" stroke-width="1" fill="none"/>
  <circle cx="27" cy="7" r="2" fill="#8A9E8A"/>
  <circle cx="7" cy="27" r="2" fill="#8A9E8A"/>
</svg>
<svg class="corner-mark br" width="54" height="54" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M2 52 C2 28 10 10 52 2" stroke="#4A7A78" stroke-width="1" fill="none"/>
  <circle cx="27" cy="7" r="2" fill="#8A9E8A"/>
  <circle cx="7" cy="27" r="2" fill="#8A9E8A"/>
</svg>

<!-- Main -->
<div class="stage">

  <!-- Brand -->
  <div class="brand-header">
    <div class="brand-name">BORIH</div>
    <div class="brand-divider"></div>
    <div class="brand-sub">마음을 걷는 시간</div>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Illustration -->
    <div class="scene">
      <svg width="200" height="72" viewBox="0 0 200 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Ground line -->
        <line x1="10" y1="62" x2="190" y2="62" stroke="#B8C9B2" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="1 6"/>
        <!-- Trees -->
        <g opacity="0.7">
          <!-- Left tree -->
          <rect x="22" y="28" width="2" height="34" rx="1" fill="#8A9E8A"/>
          <ellipse cx="23" cy="22" rx="9" ry="12" fill="#B8C9B2"/>
          <ellipse cx="23" cy="18" rx="6" ry="9" fill="#A8BBA0"/>
          <!-- Mid-left tree (small) -->
          <rect x="52" y="40" width="1.5" height="22" rx="0.75" fill="#8A9E8A"/>
          <ellipse cx="52.75" cy="35" rx="6" ry="8" fill="#C4D4BC"/>
        </g>
        <!-- Figure walking -->
        <g transform="translate(90, 20)" opacity="0.75">
          <!-- Head -->
          <circle cx="10" cy="6" r="5" fill="#8C8378"/>
          <!-- Body -->
          <path d="M10 11 L10 30" stroke="#8C8378" stroke-width="2" stroke-linecap="round"/>
          <!-- Arms (walking pose) -->
          <path d="M10 16 L4 22" stroke="#8C8378" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M10 16 L18 20" stroke="#8C8378" stroke-width="1.8" stroke-linecap="round"/>
          <!-- Legs (mid-stride) -->
          <path d="M10 30 L5 42" stroke="#8C8378" stroke-width="2" stroke-linecap="round"/>
          <path d="M10 30 L16 42" stroke="#8C8378" stroke-width="2" stroke-linecap="round"/>
        </g>
        <!-- Right trees -->
        <g opacity="0.55">
          <rect x="148" y="34" width="1.5" height="28" rx="0.75" fill="#8A9E8A"/>
          <ellipse cx="148.75" cy="29" rx="7" ry="9" fill="#B8C9B2"/>
          <rect x="170" y="24" width="2" height="38" rx="1" fill="#8A9E8A"/>
          <ellipse cx="171" cy="18" rx="10" ry="13" fill="#A8BBA0"/>
        </g>
        <!-- Scattered dots (stones/leaves) -->
        <circle cx="60" cy="63" r="1.2" fill="#C4BDB5" opacity="0.6"/>
        <circle cx="80" cy="64" r="0.9" fill="#C4BDB5" opacity="0.5"/>
        <circle cx="130" cy="63" r="1.2" fill="#C4BDB5" opacity="0.6"/>
        <circle cx="155" cy="64" r="0.9" fill="#C4BDB5" opacity="0.4"/>
      </svg>
    </div>

    <!-- Title -->
    <div class="title-block">
      <div class="walk-label">Mindful Walking Guide</div>
      <div class="walk-title">남산 백범광장<br>마인드풀 워킹</div>
      <div class="walk-desc" style="margin-top:12px;">
        <span class="breath-dot"></span>
        걷는 동안, 당신은 혼자입니다
        <span class="breath-dot"></span>
      </div>
    </div>

    <!-- Audio zone -->
    <div class="audio-zone">

      <!-- Drop state (before file loaded) -->
      <div id="drop-state" style="display:none">
        <div class="audio-drop-label">
          <div class="drop-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4A7A78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
          <div class="drop-text">
            <strong>워킹 가이드 음성</strong>
            완성된 MP3 파일을 올려주세요
          </div>
        </div>
        <div class="file-input-wrap">
          <input type="file" id="audioFile" class="file-input" accept="audio/mp3,audio/mpeg,audio/wav,audio/*">
          <label for="audioFile" class="file-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            MP3 파일 선택
          </label>
          <div class="file-name" id="fileName">—</div>
        </div>
      </div>

      <!-- Player (after file loaded) -->
      <div class="player active" id="player">
        <audio id="audio" src="guide.mp3" preload="auto"></audio>

        <div class="player-track">
          <span class="time-label" id="currentTime">0:00</span>
          <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <span class="time-label" id="duration">—</span>
        </div>

        <div class="controls">
          <!-- Rewind 15s -->
          <button class="ctrl-btn" id="rewBtn" title="15초 뒤로">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-3"/>
              <text x="8" y="14" font-size="5" fill="currentColor" stroke="none" font-family="Poppins" font-weight="500">15</text>
            </svg>
          </button>

          <!-- Play/Pause -->
          <button class="play-btn" id="playBtn">
            <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="white">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
            <svg id="pauseIcon" width="22" height="22" viewBox="0 0 24 24" fill="white" style="display:none">
              <rect x="6" y="4" width="4" height="16" rx="1"/>
              <rect x="14" y="4" width="4" height="16" rx="1"/>
            </svg>
          </button>

          <!-- Forward 15s -->
          <button class="ctrl-btn" id="fwdBtn" title="15초 앞으로">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-.49-3"/>
              <text x="8" y="14" font-size="5" fill="currentColor" stroke="none" font-family="Poppins" font-weight="500">15</text>
            </svg>
          </button>
        </div>

        </div>

    </div>
  </div>

  <!-- Footer -->
  <div class="footer-caption">
    <p>발 아래 땅을 느끼며 · 숨결을 따라 · 지금 이 순간으로</p>
    <p style="margin-top:4px; font-size:9.5px; letter-spacing:0.3em; color: var(--stone-light);">BORIH · 보리 차회 · 남산 백범광장</p>
  </div>

</div>

<script>
  // 1. 요소 선택
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');
  const progressBar = document.getElementById('progressBar');
  const progressWrap = document.getElementById('progressWrap');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  const fileNameEl = document.getElementById('fileName');

  // 2. 초기 설정: 서버의 guide.mp3를 강제로 로드
  window.addEventListener('DOMContentLoaded', () => {
    audio.src = 'guide.mp3'; // 파일 경로 명시
    audio.load();
    fileNameEl.textContent = '남산 보리 티크닉 가이드';
  });

  // 3. 재생/일시정지 로직
  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play().catch(err => {
        console.error("재생 에러:", err);
        alert("화면을 한 번 클릭한 후 재생 버튼을 눌러주세요.");
      });
    } else {
      audio.pause();
    }
  });

  // 4. 상태 변화 감지 (아이콘 변경)
  audio.addEventListener('play', () => {
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'inline-block';
  });

  audio.addEventListener('pause', () => {
    playIcon.style.display = 'inline-block';
    pauseIcon.style.display = 'none';
  });

  // 5. 시간 업데이트 및 프로그레스 바
  audio.addEventListener('timeupdate', () => {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressBar.style.width = pct + '%';
    currentTimeEl.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = fmt(audio.duration);
  });

  // 6. 클릭으로 시간 이동
  progressWrap.addEventListener('click', (e) => {
    const rect = progressWrap.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
  });

  // 시간 포맷 함수 (0:00)
  function fmt(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  // 15초 이동 버튼 연동 (필요 시)
  document.getElementById('rewBtn').addEventListener('click', () => audio.currentTime -= 15);
  document.getElementById('fwdBtn').addEventListener('click', () => audio.currentTime += 15);
</script>
